<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube ストレージ転送機</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #ff0000; font-size: 22px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #progressContainer { display: none; margin-top: 30px; }
        #progressBar { width: 100%; background: #f0f0f0; border-radius: 10px; height: 12px; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #ff0000; transition: width 0.5s; }
        #status { margin-top: 12px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>YouTube 抽出</h1>
    <input type="text" id="urlInput" placeholder="動画のURLを貼り付け">
    <button id="mainBtn" onclick="startTransfer()">ストレージへ転送を開始</button>

    <div id="progressContainer">
        <div id="progressBar"><div id="progressFill"></div></div>
        <div id="status">解析中...</div>
    </div>
</div>

<script>
async function startTransfer() {
    const url = document.getElementById('urlInput').value;
    const btn = document.getElementById('mainBtn');
    const container = document.getElementById('progressContainer');
    const fill = document.getElementById('progressFill');
    const status = document.getElementById('status');

    if (!url) return alert("URLを入力してください");

    btn.disabled = true;
    container.style.display = 'block';
    fill.style.width = '20%';
    status.innerText = "サーバーを呼び出しています...";

    try {
        // 【修正】正しいAPI窓口(api.cobalt.tools)を指定
        const res = await fetch("https://cobalt.tools", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Accept": "application/json" 
            },
            body: JSON.stringify({ 
                url: url, 
                videoQuality: "720"
            })
        });
        
        if (!res.ok) throw new Error("サーバーが応答しません");
        const data = await res.json();
        
        if (data.url) {
            fill.style.width = '70%';
            status.innerText = "ストレージに転送中...";
            
            // どこにも飛ばずに直接ダウンロード
            window.location.href = data.url;
            
            fill.style.width = '100%';
            status.innerText = "完了！保存されました。";
        } else {
            throw new Error("動画の抽出に失敗しました");
        }

    } catch (err) {
        status.innerText = "エラー: " + err.message;
        console.error("Error Detail:", err);
    } finally {
        setTimeout(() => { btn.disabled = false; }, 4000);
    }
}
</script>
</body>
</html>
