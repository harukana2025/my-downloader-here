<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube抽出ツール</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: inline-block; }
        input { width: 350px; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background: #ff0000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #cc0000; }
        .steps { text-align: left; margin-top: 25px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <h1>YouTube動画 抽出機</h1>
        <input type="text" id="ytUrl" placeholder="https://youtube.com...">
        <br>
        <button onclick="copyAndGo()">抽出を開始する</button>
        <div class="steps">
            <p><strong>使い方:</strong></p>
            <ol>
                <li>URLを入力してボタンを押す（URLがコピーされます）</li>
                <li>移動先のGitHubで「Run workflow」を押す</li>
                <li>入力欄にURLを貼り付けて実行！</li>
            </ol>
        </div>
    </div>
    <script>
        function copyAndGo() {
            const url = document.getElementById('ytUrl').value;
            if (!url) return alert("URLを入力してください");
            navigator.clipboard.writeText(url).then(() => {
                alert("URLをコピーしました！GitHubのActionsページへ移動します。");
                window.open("https://github.com", "_blank");
            });
        }
    </script>
</body>
</html>
